function FillSlot(slot,currperson,lastperson) {
	var currentBox = document.getElementById('box'+slot);
	var content = "";
	var slotperson, husband, wife;

	if( people.hasOwnProperty(currperson) && people[currperson] )
		slotperson = people[currperson];
	else {
		slotperson = new Object;
		slotperson.famc = -1;
		slotperson.personID = 0;
	}
	slots[slot] = slotperson;

	if( slotperson.personID ) {
		if( lastperson && people[lastperson] )
			slotperson.famID = people[lastperson].famc;
		else
			slotperson.famID = "";
		if( hideempty ) {
			currentBox.style.visibility = 'visible';
			toggleLines(slot,slotperson.famc,'visible');
		}

		var safeName = (slotperson.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
		var nameHtml = safeName;
		if( slotperson.kln ) {
			var safeLn = slotperson.kln.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
			var idx = safeName.toLowerCase().lastIndexOf(safeLn.toLowerCase());
			if( idx > 0 ) {
				var gn = safeName.substring(0, idx).trim();
				var ln = safeName.substring(idx).trim();
				nameHtml = '<span class="kimon-gn">' + gn + '</span> <span class="kimon-ln">' + ln + '</span>';
			}
		}
		var slotstr = "";
		if( shownumbers )
			slotstr = '<span class="lighttext">' + slot + '.</span> ';
		content = '<td class="pboxname" id="td' + slot + '">' + slotstr + nameHtml + '</td>';

		currentBox.style.backgroundColor = currentBox.oldcolor;
	}
	//no person
	else {
		if( hideempty ) {
			content = '';
			currentBox.style.visibility = "hidden";
			toggleLines(slot,0,'hidden');
		}
		else {
			content = '<td class="pboxname" id="td' + slot + '">' + unknown + '</td>';
			currentBox.style.backgroundColor = emptycolor;
		}
	}

	currentBox.innerHTML = content ? '<table border="0" class="pedboxtable" cellpadding="0" cellspacing="0"><tr>' + content + '</tr></table>' : "";

	var nextslot = slot * 2;
	if( slotperson.famc != -1 && families.hasOwnProperty(slotperson.famc) && families[slotperson.famc] ) {
		husband = families[slotperson.famc].husband;
		wife = families[slotperson.famc].wife;
	}
	else {
		husband = 0;
		wife = 0;
	}
	if( nextslot < slotceiling ) {
		FillSlot(nextslot,husband,slotperson.personID);
		nextslot++;
		FillSlot(nextslot,wife,slotperson.personID);
	}
}

function DisplayChart() {
	toplinks = "";
	botlinks = "";
	endslotctr = 0;
	endslots = new Array();

	FillSlot(1,firstperson,0);
	reflowChart();

	jQuery('#leftarrow').css('visibility','hidden').html('');

	topparams = "";
	botparams = "";
}

function reflowChart() {
	var gens = generations;
	var bvs = kimonCfg.boxVsep;
	var lw = kimonCfg.linewidth;
	var ceiling = Math.pow(2, gens);
	var boxH = {};
	var bTop = {};
	var slot, gen, box;

	// 1. Measure actual content height per box (hidden/missing → 0)
	for( slot = 1; slot < ceiling; slot++ ) {
		box = document.getElementById('box' + slot);
		if( !box ) { boxH[slot] = 0; continue; }
		if( box.style.visibility !== 'hidden' && box.innerHTML ) {
			box.style.height = 'auto';
			boxH[slot] = Math.max(17, box.offsetHeight);
		}
		else
			boxH[slot] = 0;
	}

	// 2. Compute subtree spans (bottom-up)
	var span = {};
	var lastGenStart = Math.pow(2, gens - 1);
	for( slot = lastGenStart; slot < ceiling; slot++ )
		span[slot] = boxH[slot];
	for( gen = gens - 1; gen >= 1; gen-- ) {
		var s = Math.pow(2, gen - 1);
		var e = s * 2 - 1;
		for( slot = s; slot <= e; slot++ ) {
			var fs = span[slot * 2] || 0;
			var ms = span[slot * 2 + 1] || 0;
			var gap = (fs > 0 && ms > 0) ? bvs : 0;
			span[slot] = Math.max(boxH[slot], fs + gap + ms);
		}
	}

	// 2b. Position subtrees (top-down recursive)
	for( slot = 1; slot < ceiling; slot++ )
		bTop[slot] = 0;

	function posSubtree(slot, topY) {
		var fSlot = slot * 2;
		var mSlot = fSlot + 1;
		if( fSlot >= ceiling || span[slot] === 0 ) {
			bTop[slot] = topY;
			return;
		}
		var fs = span[fSlot] || 0;
		var ms = span[mSlot] || 0;
		var gap = (fs > 0 && ms > 0) ? bvs : 0;
		if( fs > 0 && ms > 0 ) {
			var childSpan = fs + gap + ms;
			var offset = (span[slot] - childSpan) / 2;
			posSubtree(fSlot, topY + offset);
			posSubtree(mSlot, topY + offset + fs + gap);
			var fMid = bTop[fSlot] + boxH[fSlot] / 2;
			var mMid = bTop[mSlot] + boxH[mSlot] / 2;
			bTop[slot] = (fMid + mMid) / 2 - boxH[slot] / 2;
		}
		else if( fs > 0 ) {
			var offset = (span[slot] - fs) / 2;
			posSubtree(fSlot, topY + offset);
			bTop[slot] = bTop[fSlot] + boxH[fSlot] / 2 - boxH[slot] / 2;
		}
		else if( ms > 0 ) {
			var offset = (span[slot] - ms) / 2;
			posSubtree(mSlot, topY + offset);
			bTop[slot] = bTop[mSlot] + boxH[mSlot] / 2 - boxH[slot] / 2;
		}
		else {
			bTop[slot] = topY + (span[slot] - boxH[slot]) / 2;
		}
	}
	posSubtree(1, 0);

	// 2c. Normalize: shift all positions so minimum top is 0
	var minTop = bTop[1];
	for( slot = 2; slot < ceiling; slot++ ) {
		if( bTop[slot] < minTop ) minTop = bTop[slot];
	}
	if( minTop < 0 ) {
		for( slot = 1; slot < ceiling; slot++ )
			bTop[slot] -= minTop;
	}

	// 3. Apply positions and heights
	for( slot = 1; slot < ceiling; slot++ ) {
		box = document.getElementById('box' + slot);
		if( box ) {
			box.style.top = Math.round(bTop[slot]) + 'px';
			box.style.height = boxH[slot] + 'px';
		}
	}

	// 4. Remove old connector lines, redraw
	jQuery('#inner > .pedborder').remove();
	var inner = document.getElementById('inner');

	for( slot = 1; slot < ceiling; slot++ ) {
		box = document.getElementById('box' + slot);
		if( !box || box.style.visibility === 'hidden' ) continue;
		gen = Math.floor(Math.log(slot) / Math.LN2) + 1;
		var bLeft = parseInt(box.style.left);
		var bWidth = parseInt(box.style.width);
		var myMid = Math.round(bTop[slot] + boxH[slot] / 2);

		// Left horizontal (not for root)
		if( slot > 1 ) {
			var pBox = document.getElementById('box' + Math.floor(slot / 2));
			if( pBox ) {
				var halfH = Math.round((bLeft - parseInt(pBox.style.left) - parseInt(pBox.style.width)) / 2);
				addLine(inner, bLeft - halfH, myMid, halfH + 2, lw);
			}
		}

		// Right horizontal + vertical (not for last gen)
		if( gen < gens ) {
			var fBox = document.getElementById('box' + (slot * 2));
			var mBox = document.getElementById('box' + (slot * 2 + 1));
			if( fBox && mBox ) {
				var fVis = fBox.style.visibility !== 'hidden';
				var mVis = mBox.style.visibility !== 'hidden';
				if( fVis || mVis ) {
					var cLeft = parseInt(fBox.style.left);
					var halfH2 = Math.round((cLeft - bLeft - bWidth) / 2);
					var fMid2 = Math.round(bTop[slot * 2] + boxH[slot * 2] / 2);
					var mMid2 = Math.round(bTop[slot * 2 + 1] + boxH[slot * 2 + 1] / 2);
					// Right horizontal from parent
					addLine(inner, bLeft + bWidth, myMid, halfH2 + 1, lw);
					// Vertical based on child visibility
					if( fVis && mVis ) {
						addLine(inner, bLeft + bWidth + halfH2, fMid2, lw, mMid2 - fMid2 + lw);
					}
					else if( fVis ) {
						addLine(inner, bLeft + bWidth + halfH2, Math.min(myMid, fMid2), lw, Math.abs(fMid2 - myMid) + lw);
					}
					else {
						addLine(inner, bLeft + bWidth + halfH2, Math.min(myMid, mMid2), lw, Math.abs(mMid2 - myMid) + lw);
					}
				}
			}
		}
	}

	// 5. Reposition off-page arrows (hide for collapsed slots)
	for( slot = Math.pow(2, gens - 1); slot < ceiling; slot++ ) {
		var arrow = document.getElementById('offpage' + slot);
		if( !arrow ) continue;
		box = document.getElementById('box' + slot);
		if( boxH[slot] === 0 || !box || box.style.visibility === 'hidden' ) {
			arrow.style.display = 'none';
		}
		else {
			arrow.style.display = '';
			arrow.style.top = Math.round(bTop[slot] + (boxH[slot] - (arrow.offsetHeight || 10)) / 2 + 1) + 'px';
		}
	}

	// 6. Update container dimensions — scan all slots for actual extent
	var maxBot = 0;
	var maxRight = 0;
	for( slot = 1; slot < ceiling; slot++ ) {
		if( boxH[slot] > 0 ) {
			var bot = bTop[slot] + boxH[slot];
			if( bot > maxBot ) maxBot = bot;
		}
		box = document.getElementById('box' + slot);
		if( box && box.style.visibility !== 'hidden' ) {
			var right = parseInt(box.style.left) + parseInt(box.style.width);
			if( right > maxRight ) maxRight = right;
		}
	}
	for( slot = Math.pow(2, gens - 1); slot < ceiling; slot++ ) {
		if( boxH[slot] === 0 ) continue;
		var arrow = document.getElementById('offpage' + slot);
		if( arrow && arrow.offsetParent ) {
			var ar = arrow.offsetLeft + arrow.offsetWidth;
			if( ar > maxRight ) maxRight = ar;
		}
	}
	var totalH = Math.round(maxBot + 1);
	inner.style.height = totalH + 'px';
	if( maxRight > 0 )
		inner.style.width = (maxRight + 2) + 'px';
	var outer = document.getElementById('outer');
	if( outer ) outer.style.height = (totalH + 20) + 'px';
}

function addLine(parent, left, top, width, height) {
	var div = document.createElement('div');
	div.className = 'boxborder pedborder';
	div.style.cssText = 'position:absolute;top:' + top + 'px;left:' + left + 'px;width:' + width + 'px;height:' + height + 'px;';
	parent.appendChild(div);
}

var _origSetFirstPerson = setFirstPerson;
setFirstPerson = function(newperson) {
	_origSetFirstPerson(newperson);
	if( !tngprint ) {
		var params = 'personID=' + encodeURIComponent(newperson) + '&tree=' + encodeURIComponent(tree) + '&parentset=' + encodeURIComponent(parentset) + '&generations=' + encodeURIComponent(generations);
		jQuery("#kimonpedlnk").attr('href',pedigree_url + params + '&display=kimon');
	}
};

var kimonSaving = false;

function roundRect(ctx, x, y, w, h, r) {
	if( r > w / 2 ) r = w / 2;
	if( r > h / 2 ) r = h / 2;
	ctx.beginPath();
	ctx.moveTo(x + r, y);
	ctx.arcTo(x + w, y, x + w, y + h, r);
	ctx.arcTo(x + w, y + h, x, y + h, r);
	ctx.arcTo(x, y + h, x, y, r);
	ctx.arcTo(x, y, x + w, y, r);
	ctx.closePath();
}

function kimonSave(format) {
	if( kimonSaving ) return;

	var inner = document.getElementById('inner');
	if( !inner ) return;

	if( !inner.offsetHeight || !inner.offsetWidth ) {
		alert('Nothing to export — the chart appears empty.');
		return;
	}

	if( jQuery('#loading').is(':visible') ) {
		alert('Please wait for the chart to finish loading.');
		return;
	}

	kimonSaving = true;
	var savePngEl = document.getElementById('ksavepnglnk');
	var saveJpgEl = document.getElementById('ksavejpglnk');
	var oldPngText = savePngEl ? savePngEl.textContent : '';
	var oldJpgText = saveJpgEl ? saveJpgEl.textContent : '';
	if( savePngEl ) savePngEl.textContent = 'Saving\u2026';
	if( saveJpgEl ) saveJpgEl.textContent = 'Saving\u2026';

	var isJpg = (format === 'jpg');
	var mimeType = isJpg ? 'image/jpeg' : 'image/png';
	var quality = isJpg ? 0.92 : undefined;
	var ext = isJpg ? 'jpg' : 'png';

	var pid = (typeof firstperson !== 'undefined' && firstperson) ? firstperson : (typeof personID !== 'undefined' ? personID : 'unknown');
	var gens = parseInt(generations, 10) || 4;
	var filename = ('pedigree_' + pid + '_' + gens + 'gen.' + ext).replace(/[^a-zA-Z0-9._-]/g, '_');

	// Dynamic scale cap for iOS Safari (16M pixel limit)
	var scale = 2;
	var maxPixels = 16777216;
	var shadowPad = kimonCfg.shadowoffset || 0;
	var margin = 10;

	function finish() {
		kimonSaving = false;
		if( savePngEl ) savePngEl.textContent = oldPngText;
		if( saveJpgEl ) saveJpgEl.textContent = oldJpgText;
	}

	try {
		var ceiling = Math.pow(2, gens);

		// Compute actual content bounds
		var minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
		for( var slot = 1; slot < ceiling; slot++ ) {
			var box = document.getElementById('box' + slot);
			if( !box || box.style.visibility === 'hidden' || parseInt(box.style.height) === 0 ) continue;
			var bx = parseInt(box.style.left);
			var by = parseInt(box.style.top);
			var br = bx + parseInt(box.style.width) + shadowPad;
			var bb = by + parseInt(box.style.height) + shadowPad;
			if( bx < minX ) minX = bx;
			if( by < minY ) minY = by;
			if( br > maxX ) maxX = br;
			if( bb > maxY ) maxY = bb;
		}
		var connectors = inner.querySelectorAll('.pedborder');
		for( var i = 0; i < connectors.length; i++ ) {
			var div = connectors[i];
			var dx = parseInt(div.style.left);
			var dy = parseInt(div.style.top);
			var dr = dx + parseInt(div.style.width);
			var db = dy + parseInt(div.style.height);
			if( dx < minX ) minX = dx;
			if( dy < minY ) minY = dy;
			if( dr > maxX ) maxX = dr;
			if( db > maxY ) maxY = db;
		}
		if( minX === Infinity ) { finish(); return; }

		var w = maxX - minX + 2 * margin;
		var h = maxY - minY + 2 * margin;

		if( w * h * scale * scale > maxPixels )
			scale = Math.max(1, Math.floor(Math.sqrt(maxPixels / (w * h))));
		if( w * h * scale * scale > maxPixels ) {
			alert('This chart is too large to export on this device. Try reducing the number of generations.');
			finish();
			return;
		}

		var canvas = document.createElement('canvas');
		canvas.width = w * scale;
		canvas.height = h * scale;
		var ctx = canvas.getContext('2d');
		ctx.scale(scale, scale);
		ctx.translate(margin - minX, margin - minY);

		// 1. Background
		if( isJpg ) {
			ctx.fillStyle = '#ffffff';
			ctx.fillRect(minX - margin, minY - margin, w, h);
		}

		// 2. Connector lines (lowest z-order)
		var connectors = inner.querySelectorAll('.pedborder');
		for( var i = 0; i < connectors.length; i++ ) {
			var div = connectors[i];
			ctx.fillStyle = getComputedStyle(div).backgroundColor;
			ctx.fillRect(
				parseInt(div.style.left), parseInt(div.style.top),
				parseInt(div.style.width), parseInt(div.style.height)
			);
		}

		// 3. Boxes (above connectors)
		for( var slot = 1; slot < ceiling; slot++ ) {
			var box = document.getElementById('box' + slot);
			if( !box || box.style.visibility === 'hidden' || parseInt(box.style.height) === 0 ) continue;

			var bx = parseInt(box.style.left);
			var by = parseInt(box.style.top);
			var bw = parseInt(box.style.width);
			var bh = parseInt(box.style.height);
			var borderRadius = parseFloat(getComputedStyle(box).borderTopLeftRadius) || 0;

			// Box shadow — sharp offset filled rect
			if( shadowPad > 0 ) {
				ctx.fillStyle = kimonCfg.shadowcolor;
				roundRect(ctx, bx + shadowPad, by + shadowPad, bw, bh, borderRadius);
				ctx.fill();
			}

			// Box fill
			roundRect(ctx, bx, by, bw, bh, borderRadius);
			ctx.fillStyle = getComputedStyle(box).backgroundColor;
			ctx.fill();

			// Box border
			var borderW = parseFloat(getComputedStyle(box).borderWidth) || 0;
			if( borderW > 0 ) {
				ctx.strokeStyle = getComputedStyle(box).borderColor;
				ctx.lineWidth = borderW;
				ctx.stroke();
			}
		}

		// 4. Text (highest z-order)
		ctx.textBaseline = 'middle';
		for( var slot = 1; slot < ceiling; slot++ ) {
			var box = document.getElementById('box' + slot);
			if( !box || box.style.visibility === 'hidden' || parseInt(box.style.height) === 0 ) continue;

			var td = document.getElementById('td' + slot);
			if( !td ) continue;

			var bx = parseInt(box.style.left);
			var by = parseInt(box.style.top);
			var bw = parseInt(box.style.width);
			var bh = parseInt(box.style.height);
			var borderRadius = parseFloat(getComputedStyle(box).borderTopLeftRadius) || 0;

			// Read font properties from td
			var tdStyle = getComputedStyle(td);
			var fontSize = tdStyle.fontSize || '8pt';
			var fontFamily = tdStyle.fontFamily || 'Arial, sans-serif';
			var fontWeight = tdStyle.fontWeight || 'normal';
			var tdColor = tdStyle.color;
			var pad = parseFloat(tdStyle.paddingTop) || 0;
			var borderW = parseFloat(getComputedStyle(box).borderWidth) || 0;

			ctx.font = fontWeight + ' ' + fontSize + ' ' + fontFamily;

			// First pass: measure total text width
			var totalWidth = 0;
			var segments = [];
			var nodes = td.childNodes;
			for( var n = 0; n < nodes.length; n++ ) {
				var node = nodes[n];
				var text, color;
				if( node.nodeType === 1 ) {
					text = node.textContent;
					color = getComputedStyle(node).color;
				}
				else if( node.nodeType === 3 ) {
					text = node.nodeValue;
					color = tdColor;
				}
				else continue;
				if( !text ) continue;
				var tw = ctx.measureText(text).width;
				totalWidth += tw;
				segments.push({ text: text, color: color, width: tw });
			}

			// Centering: account for border-box height and padding
			var xStart = bx + (bw - totalWidth) / 2;
			var yCenter = by + borderW + pad + (bh - 2 * borderW - 2 * pad) / 2;

			// Clip to box bounds
			ctx.save();
			roundRect(ctx, bx, by, bw, bh, borderRadius);
			ctx.clip();

			// Second pass: draw each segment
			var curX = xStart;
			for( var s = 0; s < segments.length; s++ ) {
				ctx.fillStyle = segments[s].color;
				ctx.fillText(segments[s].text, curX, yCenter);
				curX += segments[s].width;
			}

			ctx.restore();
		}

		// 5. Off-page arrows
		var arrowColor = (typeof pedbordercolor !== 'undefined') ? pedbordercolor : '#777777';
		var lastGenStart = Math.pow(2, gens - 1);
		for( var slot = lastGenStart; slot < ceiling; slot++ ) {
			var arrow = document.getElementById('offpage' + slot);
			if( !arrow || arrow.style.display === 'none' || getComputedStyle(arrow).visibility === 'hidden' ) continue;
			var ax = parseInt(arrow.style.left);
			var ay = parseInt(arrow.style.top);
			var aw = arrow.offsetWidth || 8;
			var ah = arrow.offsetHeight || 10;
			ctx.fillStyle = arrowColor;
			ctx.beginPath();
			ctx.moveTo(ax, ay);
			ctx.lineTo(ax + aw, ay + ah / 2);
			ctx.lineTo(ax, ay + ah);
			ctx.closePath();
			ctx.fill();
		}

		// 6. Export as blob
		canvas.toBlob(function(blob) {
			if( !blob ) {
				alert('Export failed: could not generate image.');
				finish();
				return;
			}
			var url = URL.createObjectURL(blob);
			var link = document.createElement('a');
			link.download = filename;
			link.href = url;
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
			setTimeout(function(){ URL.revokeObjectURL(url); }, 60000);
			finish();
		}, mimeType, quality);
	}
	catch(err) {
		alert('Export failed: ' + (err && err.message ? err.message : String(err || 'Unknown error')));
		finish();
	}
}
%fileend:%
